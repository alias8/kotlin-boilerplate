services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/featureflags
      DATABASE_USER: jameskirk
      DATABASE_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: featureflags
      POSTGRES_USER: jameskirk
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U jameskirk" ]
      interval: 10s
      timeout: 5s
      retries: 5
